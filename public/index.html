<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ME Lawyers — Demand Drafting</title>
  <link href="https://fonts.googleapis.com/css2?family=Cambay:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000032; color: #fafbfe;
      font-family: 'Cambay', sans-serif;
      min-height: 100vh; padding: 28px 16px 56px;
    }
    .container { max-width: 980px; margin: 0 auto; }

    /* BAA banner */
    .baa-banner {
      background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4);
      color: #ffb4b4; border-radius: 10px; padding: 10px 16px; margin-bottom: 20px;
      font-size: 0.82rem; font-weight: 700; text-align: center; letter-spacing: 0.02em;
    }

    /* Header */
    .header { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
    .header img { height: 50px; width: auto; }
    .header-text h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.01em; }
    .header-text p { font-size: 0.78rem; color: #a8b6ff; margin-top: 3px; }

    .divider { height: 1px; background: rgba(168,182,255,0.15); margin: 22px 0; }

    .field-label { font-size: 0.72rem; font-weight: 700; color: #a8b6ff; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; display: block; }

    input[type="text"], input[type="password"], textarea {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(168,182,255,0.2);
      border-radius: 10px; color: #fafbfe; font-size: 0.95rem; font-family: inherit;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus { outline: none; border-color: #00d36b; }
    input::placeholder, textarea::placeholder { color: rgba(250,251,254,0.25); }
    textarea { resize: vertical; line-height: 1.5; }

    button {
      padding: 14px 20px; border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: opacity 0.15s, transform 0.1s;
    }
    button:disabled { opacity: 0.25; cursor: not-allowed; }
    button:not(:disabled):hover { opacity: 0.88; }
    button:not(:disabled):active { transform: scale(0.98); }
    .btn-primary { background: #00d36b; color: #000032; }
    .btn-secondary { background: rgba(255,255,255,0.06); color: #fafbfe; border: 1px solid rgba(168,182,255,0.2); }

    .card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(168,182,255,0.15);
      border-radius: 10px; padding: 18px; margin-bottom: 16px;
    }

    /* Login */
    #login-view { max-width: 380px; margin: 40px auto 0; }
    #login-view input { margin-bottom: 12px; }
    #login-view button { width: 100%; }
    .login-error { color: #ef4444; font-size: 0.82rem; margin-top: 8px; min-height: 1em; }

    /* Workspace */
    .workspace { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .col-inputs > *:not(:last-child) { margin-bottom: 16px; }

    /* Case picker */
    .case-search-wrap { position: relative; }
    .results {
      position: absolute; z-index: 20; left: 0; right: 0; top: calc(100% + 4px);
      background: #0a0a3f; border: 1px solid rgba(168,182,255,0.25); border-radius: 10px;
      max-height: 260px; overflow-y: auto; display: none;
    }
    .results.open { display: block; }
    .result-item { padding: 10px 14px; font-size: 0.86rem; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .result-item:hover { background: rgba(168,182,255,0.1); }
    .result-item .rp { color: #a8b6ff; font-size: 0.74rem; }
    .selected-chip {
      display: none; align-items: center; gap: 10px; margin-top: 10px;
      background: rgba(0,211,107,0.1); border: 1px solid rgba(0,211,107,0.3);
      border-radius: 8px; padding: 8px 12px; font-size: 0.84rem; color: #00d36b;
    }
    .selected-chip button { padding: 2px 8px; font-size: 0.75rem; background: transparent; color: #00d36b; border: 1px solid rgba(0,211,107,0.4); }

    /* File drop zones */
    .dropzone {
      border: 1px dashed rgba(168,182,255,0.35); border-radius: 10px;
      padding: 18px; text-align: center; color: #a8b6ff; font-size: 0.84rem;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .dropzone:hover, .dropzone.drag { border-color: #00d36b; background: rgba(0,211,107,0.06); }
    .filelist { list-style: none; margin-top: 10px; }
    .filelist li { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; padding: 6px 10px; background: rgba(0,0,0,0.25); border-radius: 8px; margin-bottom: 6px; }
    .filelist .fsize { color: #a8b6ff; font-size: 0.74rem; margin-left: auto; }
    .filelist button { padding: 2px 8px; font-size: 0.75rem; background: transparent; color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }

    /* Output */
    .col-output { display: flex; flex-direction: column; }
    #output { flex: 1; min-height: 520px; font-family: 'Courier New', monospace; font-size: 0.84rem; }
    .output-toolbar { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    .wordcount { color: #a8b6ff; font-size: 0.76rem; margin-left: auto; }

    .warn {
      background: rgba(251,191,36,0.12); border: 1px solid rgba(251,191,36,0.4);
      color: #fbbf24; border-radius: 8px; padding: 10px 14px; font-size: 0.8rem; margin-bottom: 12px;
    }
    .err {
      background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.35);
      color: #ef4444; border-radius: 8px; padding: 10px 14px; font-size: 0.82rem; margin-bottom: 12px;
    }
    .status { color: #a8b6ff; font-size: 0.82rem; }

    .hidden { display: none !important; }

    @media (max-width: 820px) {
      .workspace { grid-template-columns: 1fr; }
      #output { min-height: 320px; }
    }
    @media (max-width: 640px) {
      body { padding: 16px 12px 32px; }
      .header img { height: 38px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="baa-banner">
      PRIVATE BUILD — no real client data until Anthropic BAA is signed
    </div>

    <div class="header">
      <img src="logo.png" alt="ME Lawyers" />
      <div class="header-text">
        <h1>Demand Drafting</h1>
        <p>Litigation department — Filevine + Claude</p>
      </div>
    </div>
    <div class="divider"></div>

    <!-- Login -->
    <div id="login-view" class="card">
      <label class="field-label" for="lg-user">Username</label>
      <input type="text" id="lg-user" autocomplete="username" />
      <label class="field-label" for="lg-pass">Password</label>
      <input type="password" id="lg-pass" autocomplete="current-password" />
      <button class="btn-primary" id="lg-btn">Sign in</button>
      <div class="login-error" id="lg-err"></div>
    </div>

    <!-- Workspace -->
    <div id="app-view" class="hidden">
      <div class="workspace">
        <div class="col-inputs">
          <!-- Case picker -->
          <div class="card">
            <label class="field-label">Case (Filevine)</label>
            <div class="case-search-wrap">
              <input type="text" id="case-search" placeholder="Search by case number or client name…" autocomplete="off" />
              <div class="results" id="case-results"></div>
            </div>
            <div class="selected-chip" id="case-chip">
              <span id="case-chip-text"></span>
              <button id="case-clear">clear</button>
            </div>
          </div>

          <!-- Case documents -->
          <div class="card">
            <label class="field-label">Case documents</label>
            <div class="dropzone" id="dz-docs">Drop PDFs, DOCX or TXT here, or click to choose</div>
            <input type="file" id="in-docs" class="hidden" multiple accept=".pdf,.docx,.txt" />
            <ul class="filelist" id="list-docs"></ul>
          </div>

          <!-- Custom prompt -->
          <div class="card">
            <label class="field-label" for="prompt">Custom instructions</label>
            <textarea id="prompt" rows="5" placeholder="e.g. Emphasize the lumbar surgery and lost wages. Address to the adjuster. Formal tone."></textarea>
          </div>

          <!-- Prior demands -->
          <div class="card">
            <label class="field-label">Prior demands (style model — up to 3)</label>
            <div class="dropzone" id="dz-priors">Drop prior demand letters here, or click to choose</div>
            <input type="file" id="in-priors" class="hidden" multiple accept=".pdf,.docx,.txt" />
            <ul class="filelist" id="list-priors"></ul>
          </div>

          <button class="btn-primary" id="gen-btn" style="width:100%" disabled>Generate demand</button>
          <div class="status" id="gen-status" style="margin-top:10px;"></div>
        </div>

        <!-- Output -->
        <div class="col-output">
          <label class="field-label">Output</label>
          <div id="warnings"></div>
          <textarea id="output" placeholder="The generated demand letter will appear here…"></textarea>
          <div class="output-toolbar">
            <button class="btn-secondary" id="copy-btn">Copy</button>
            <span class="wordcount" id="wordcount">0 words</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
